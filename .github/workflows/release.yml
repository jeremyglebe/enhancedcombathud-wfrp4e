name: Release

on:
  push:
    tags:
      - "*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Verify version
        run: test "$(jq -r .version module.json)" = "${GITHUB_REF_NAME}"

      - name: Build module archive
        run: zip -r module.zip module.json lang scripts README.md LICENSE

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" module.zip module.json --generate-notes --title "$GITHUB_REF_NAME"
